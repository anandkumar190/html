name: Auto Deploy EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
        #  host: ${{ secrets.EC2_HOST }}
          host: 65.1.88.175

          
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          debug: true

          script: |
            echo "Connected"

            cd /var/www/html

            pwd

            git status

            git pull origin main